user nginx;
worker_processes auto;
events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  client_max_body_size 25m; # screenshots

  upstream flowace_backend {
    server backend:4000;
  }

  # Redirect HTTP -> HTTPS
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name api.yourdomain.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Socket.IO (WebSocket upgrade)
    location /socket.io/ {
      proxy_pass http://flowace_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 3600s;
    }

    # Screenshots are served directly from the shared volume.
    location /uploads/screenshots/ {
      alias /data/uploads/screenshots/;
      expires 1d;
      add_header Cache-Control "private";
    }

    # Agent one-line install scripts (upload from agent/install/).
    location = /install.ps1 { root /data/agent; default_type text/plain; }
    location = /install.sh  { root /data/agent; default_type text/plain; }

    # Agent installers (upload electron-builder output here as
    # Trackly-Setup.exe / Trackly.dmg / Trackly.AppImage).
    location /downloads/ {
      alias /data/agent/downloads/;
      autoindex off;
    }

    # REST API + everything else
    location / {
      proxy_pass http://flowace_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
