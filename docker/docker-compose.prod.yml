# Production stack for a VPS that already runs Coolify (Traefik on 80/443).
# We don't run our own proxy — we attach the backend to Coolify's `coolify`
# network and let its Traefik route the domain to us with automatic TLS.
#
#   cd docker && docker compose -f docker-compose.prod.yml up -d --build
name: trackly

services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL (Supabase pooled, :6543)}
      DIRECT_URL: ${DIRECT_URL:?set DIRECT_URL (Supabase direct, :5432)}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      AGENT_TOKEN_SECRET: ${AGENT_TOKEN_SECRET:?set AGENT_TOKEN_SECRET}
      UPLOADS_DIR: /data/uploads/screenshots
      DOWNLOADS_DIR: /data/downloads
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?e.g. https://tracker.zootcloud.com}
      CORS_ORIGIN: ${CORS_ORIGIN:?dashboard origin(s), comma-separated}
      # WebRTC live view (TURN). Empty TURN_SECRET disables TURN (STUN only).
      TURN_SECRET: ${TURN_SECRET:-}
      TURN_HOST: ${TRACKLY_DOMAIN}
      TURN_PORT: "3478"
    volumes:
      - uploads:/data/uploads/screenshots
      # Drop built installers + install scripts here on the VPS; served at /downloads.
      - ./agent-dist:/data/downloads:ro
    networks:
      - coolify
    expose:
      - "4000"
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      # HTTPS router (Let's Encrypt via Coolify's resolver)
      - "traefik.http.routers.trackly.rule=Host(`${TRACKLY_DOMAIN}`)"
      - traefik.http.routers.trackly.entrypoints=https
      - traefik.http.routers.trackly.tls=true
      - traefik.http.routers.trackly.tls.certresolver=letsencrypt
      - traefik.http.routers.trackly.service=trackly
      # HTTP router → redirect to HTTPS
      - "traefik.http.routers.trackly-http.rule=Host(`${TRACKLY_DOMAIN}`)"
      - traefik.http.routers.trackly-http.entrypoints=http
      - traefik.http.routers.trackly-http.middlewares=trackly-redirect
      - traefik.http.middlewares.trackly-redirect.redirectscheme.scheme=https
      # Tell Traefik which port the app listens on
      - traefik.http.services.trackly.loadbalancer.server.port=4000

  # TURN/STUN relay for WebRTC live view. Uses host networking (recommended for
  # TURN) so it binds the VPS's public IP directly. Open these ports in the VPS
  # firewall: 3478/tcp, 3478/udp, and 49160-49200/udp.
  coturn:
    image: coturn/coturn:4.6-alpine
    restart: unless-stopped
    network_mode: host
    command:
      - -n
      - --log-file=stdout
      - --listening-port=3478
      - --min-port=49160
      - --max-port=49200
      - --realm=${TRACKLY_DOMAIN}
      - --use-auth-secret
      - --static-auth-secret=${TURN_SECRET:?set TURN_SECRET for live view}
      - --external-ip=${TURN_EXTERNAL_IP:?set TURN_EXTERNAL_IP to the VPS public IP}
      - --no-cli
      - --no-tls
      - --no-dtls

volumes:
  uploads:

networks:
  coolify:
    external: true
