<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trackly — Enrollment</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background: #0a0a0a;
        color: #fafafa;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .card {
        width: 360px;
        padding: 32px;
        border: 1px solid #262626;
        border-radius: 16px;
        background: #111;
      }
      .logo {
        width: 44px; height: 44px; border-radius: 12px;
        background: #fafafa; color: #0a0a0a;
        display: grid; place-items: center; font-weight: 700; font-size: 20px;
        margin-bottom: 20px;
      }
      h1 { font-size: 18px; margin: 0 0 4px; }
      p { font-size: 13px; color: #a3a3a3; margin: 0 0 24px; }
      label { font-size: 12px; color: #d4d4d4; display: block; margin-bottom: 8px; }
      input {
        width: 100%; padding: 10px 12px; border-radius: 8px;
        border: 1px solid #333; background: #0a0a0a; color: #fafafa; font-size: 14px;
      }
      button {
        width: 100%; margin-top: 16px; padding: 10px; border: none; border-radius: 8px;
        background: #fafafa; color: #0a0a0a; font-weight: 600; font-size: 14px; cursor: pointer;
      }
      button:disabled { opacity: 0.6; cursor: default; }
      .error { color: #f87171; font-size: 12px; margin-top: 12px; min-height: 16px; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">T</div>
      <h1>Enroll this device</h1>
      <p>Enter the enrollment token provided by your administrator.</p>
      <label for="token">Enrollment token</label>
      <input id="token" type="text" placeholder="Paste token…" autofocus />
      <button id="submit">Enroll device</button>
      <div class="error" id="error"></div>
    </div>
    <script>
      const tokenInput = document.getElementById("token");
      const button = document.getElementById("submit");
      const error = document.getElementById("error");

      async function submit() {
        const token = tokenInput.value.trim();
        if (!token) {
          error.textContent = "Token is required.";
          return;
        }
        button.disabled = true;
        button.textContent = "Enrolling…";
        error.textContent = "";
        try {
          const result = await window.flowace.enroll(token);
          if (!result.ok) {
            error.textContent = result.message || "Enrollment failed.";
            button.disabled = false;
            button.textContent = "Enroll device";
          }
          // On success the main process closes this window.
        } catch (e) {
          error.textContent = "Enrollment failed.";
          button.disabled = false;
          button.textContent = "Enroll device";
        }
      }

      button.addEventListener("click", submit);
      tokenInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") submit();
      });
    </script>
  </body>
</html>
